<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Mountain Top University</title>
    <link rel="stylesheet" href="dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <header class="dashboard-header">
        <div class="header-left">
            <div class="logo-placeholder">MTU</div>
            <h1 class="header-title">MOUNTAIN TOP UNIVERSITY CLEARANCE</h1>
        </div>
        <div class="header-right">
            <div class="user-info">
                <span id="userName">User</span>
                <span id="userRole" class="role-badge">Role</span>
                <button id="logoutBtn" class="logout-btn">Logout</button>
            </div>
        </div>
    </header>

    <div class="dashboard-container">
        <aside class="sidebar">
            <nav class="sidebar-nav" id="sidebarNav">
                <!-- Dynamically populated based on role -->
            </nav>
        </aside>

        <main class="main-content" id="mainContent">
            <!-- Dynamically populated based on role -->
        </main>
    </div>

    <script>
        // Get current user from localStorage
        function getCurrentUser() {
            const user = localStorage.getItem('currentUser');
            if (!user) {
                window.location.href = 'index.html';
                return null;
            }
            return JSON.parse(user);
        }

        // Initialize dashboard on load
        const currentUser = getCurrentUser();

        if (currentUser) {
            document.getElementById('userName').textContent = currentUser.name;
            document.getElementById('userRole').textContent = currentUser.role.toUpperCase();
            renderDashboard(currentUser.role);
        }

        // Render sidebar and content based on role
        function renderDashboard(role) {
            const sidebarNav = document.getElementById('sidebarNav');
            const mainContent = document.getElementById('mainContent');

            // Clear previous content
            sidebarNav.innerHTML = '';
            mainContent.innerHTML = '';

            if (role === 'student') {
                renderStudentDashboard(sidebarNav, mainContent);
            } else if (role === 'officer') {
                renderOfficerDashboard(sidebarNav, mainContent);
            } else if (role === 'admin') {
                renderAdminDashboard(sidebarNav, mainContent);
            } else if (role === 'super_admin') {
                renderSuperAdminDashboard(sidebarNav, mainContent);
            }
        }

                    </div>

                        <div class="card-icon-wrapper">
                            <span>🔐</span>
                        </div>
                        <div class="card-title">Security Audit</div>

                    <div class="dashboard-card">
                        <div class="card-icon-wrapper">
                            <span>📋</span>
                        </div>
                        <div class="card-title">Activity Logs</div>

                    <div class="dashboard-card">

                            <span>👥</span>

                        <div class="card-title">User Accounts</div>

                    </div>

            `;

            attachNavListeners();
        }

        // Attach listeners to navigation items
        function attachNavListeners() {
            const navItems = document.querySelectorAll('.nav-item');

            // Remove existing listeners first to avoid duplicates
            navItems.forEach(item => {
                item.removeEventListener('click', handleNavClick);
            });

            // Add new listeners
            navItems.forEach(item => {
                item.addEventListener('click', handleNavClick);
            });
        }

        // Separate handler function to avoid closure issues
        function handleNavClick(e) {
            e.preventDefault();
            const item = e.currentTarget;
            document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
            item.classList.add('active');

            const page = item.dataset.page;
            const role = currentUser?.role;

            // Always render the main dashboard for the current role
            if (page === 'dashboard') {
                renderDashboard(role);
                return;
            }

            // Render secondary pages depending on current role
            if (role === 'officer') {
                renderOfficerPage(page);
            } else if (role === 'admin') {
                renderAdminPage(page);
            } else if (role === 'super_admin') {
                renderSuperAdminPage(page);
            } else if (role === 'student') {
                renderStudentPage(page);
            }
        }

        // Attach listeners to dashboard cards
        function attachCardListeners() {
            const cards = document.querySelectorAll('.dashboard-card.clickable');
            cards.forEach(card => {
                card.addEventListener('click', (e) => {
                    e.preventDefault();
                    const action = card.dataset.action;
                    
                    // Activate the corresponding nav item
                    document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
                    const navItem = document.querySelector(`.nav-item[data-page="${action}"]`);
                    if (navItem) {
                        navItem.classList.add('active');
                    }
                    
                    // Render the page
                    renderOfficerPage(action);
                });
            });
        }

        // Render specific officer pages
        function renderOfficerPage(page) {
            const content = document.getElementById('mainContent');

            if (page === 'pending') {
                renderPendingRequests(content);
            } else if (page === 'approved') {
                renderApprovedApplications(content);
            } else if (page === 'flagged') {
                renderFlaggedApplications(content);
            } else if (page === 'reports') {
                renderReports(content);
            }

            // Re-attach event listeners after rendering content
            setTimeout(() => {
                attachNavListeners();
            }, 0);
        }

        // Render admin secondary pages
        function renderAdminPage(page) {
            const content = document.getElementById('mainContent');

            if (page === 'users') {
                renderUserManagement(content);
            } else if (page === 'departments') {
                renderDepartmentManagement(content);
            } else if (page === 'settings') {
                renderSystemSettings(content);
            }
        }

        // Manage Users
        function renderUserManagement(content) {
            content.innerHTML = `
                <div class="page-header">
                    <h2>Manage Users</h2>
                    <p class="page-subtitle">Create, edit, or deactivate user accounts</p>
                    <button class="primary-btn" id="addUserBtn">Add User</button>
                </div>

                <div class="applications-table">
                    <div class="table-header">
                        <div class="col-name">Name</div>
                        <div class="col-email">Email</div>
                        <div class="col-role">Role</div>
                        <div class="col-status">Status</div>
                        <div class="col-actions">Actions</div>
                    </div>
                    ${mockUsers.map(user => `
                        <div class="table-row">
                            <div class="col-name">${user.name}</div>
                            <div class="col-email">${user.email}</div>
                            <div class="col-role">${user.role}</div>
                            <div class="col-status">
                                <span class="status-badge ${user.active ? 'approved' : 'rejected'}">${user.active ? 'Active' : 'Inactive'}</span>
                            </div>
                            <div class="col-actions">
                                <button class="action-btn review" onclick="openUserModal('edit', ${user.id})">Edit</button>
                                <button class="action-btn reject" onclick="toggleUserStatus(${user.id})">${user.active ? 'Deactivate' : 'Activate'}</button>
                                <button class="action-btn delete" onclick="deleteUser(${user.id})">Delete</button>
                            </div>
                        </div>
                    `).join('')}
                </div>

                <div id="userModal" class="modal-overlay hidden">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h3 id="userModalTitle">Add User</h3>
                            <button class="modal-close" type="button" onclick="closeUserModal()">×</button>
                        </div>
                        <div class="modal-body">
                            <div class="form-row">
                                <label for="userNameInput">Name</label>
                                <input id="userNameInput" type="text" placeholder="Full name" />
                            </div>
                            <div class="form-row">
                                <label for="userEmailInput">Email</label>
                                <input id="userEmailInput" type="email" placeholder="name@university.edu" />
                            </div>
                            <div class="form-row">
                                <label for="userRoleSelect">Role</label>
                                <select id="userRoleSelect">
                                    <option value="student">Student</option>
                                    <option value="officer">Officer</option>
                                    <option value="admin">Admin</option>
                                    <option value="super_admin">Super Admin</option>
                                </select>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button class="modal-btn cancel" type="button" onclick="closeUserModal()">Cancel</button>
                            <button class="modal-btn approve" type="button" id="saveUserBtn">Save</button>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('addUserBtn').addEventListener('click', () => openUserModal('create'));
        }

        function openUserModal(mode, userId) {
            const modal = document.getElementById('userModal');
            const title = document.getElementById('userModalTitle');
            const nameInput = document.getElementById('userNameInput');
            const emailInput = document.getElementById('userEmailInput');
            const roleSelect = document.getElementById('userRoleSelect');
            const saveBtn = document.getElementById('saveUserBtn');

            modal.dataset.mode = mode;
            modal.dataset.userId = userId || '';

            if (mode === 'edit') {
                const user = mockUsers.find(u => u.id === userId);
                title.textContent = 'Edit User';
                nameInput.value = user.name;
                emailInput.value = user.email;
                roleSelect.value = user.role;
            } else {
                title.textContent = 'Add User';
                nameInput.value = '';
                emailInput.value = '';
                roleSelect.value = 'student';
            }

            saveBtn.onclick = () => saveUserFromModal();
            modal.classList.remove('hidden');
        }

        function closeUserModal() {
            const modal = document.getElementById('userModal');
            if (modal) {
                modal.classList.add('hidden');
            }
        }

        function saveUserFromModal() {
            const modal = document.getElementById('userModal');
            const mode = modal.dataset.mode;
            const userId = parseInt(modal.dataset.userId);
            const name = document.getElementById('userNameInput').value.trim();
            const email = document.getElementById('userEmailInput').value.trim();
            const role = document.getElementById('userRoleSelect').value;

            if (!name || !email) {
                alert('Please provide both name and email.');
                return;
            }

            if (mode === 'edit') {
                const user = mockUsers.find(u => u.id === userId);
                if (!user) return;
                user.name = name;
                user.email = email;
                user.role = role;
            } else {
                const newId = Math.max(0, ...mockUsers.map(u => u.id)) + 1;
                mockUsers.push({ id: newId, name, email, role, active: true });
            }

            closeUserModal();
            saveUsersToStorage();
            renderUserManagement(document.getElementById('mainContent'));
        }

        function toggleUserStatus(userId) {
            const user = mockUsers.find(u => u.id === userId);
            if (!user) return;
            user.active = !user.active;
            saveUsersToStorage();
            renderUserManagement(document.getElementById('mainContent'));
        }

        function deleteUser(userId) {
            const user = mockUsers.find(u => u.id === userId);
            if (!user) return;

            if (confirm(`Delete user ${user.name}? This cannot be undone.`)) {
                const index = mockUsers.findIndex(u => u.id === userId);
                mockUsers.splice(index, 1);
                saveUsersToStorage();
                renderUserManagement(document.getElementById('mainContent'));
            }
        }

        // Manage Departments
        function renderDepartmentManagement(content) {
            content.innerHTML = `
                <div class="page-header">
                    <h2>Departments</h2>
                    <p class="page-subtitle">Manage department settings and clearance requirements</p>
                    <button class="primary-btn" id="addDepartmentBtn">Add Department</button>
                </div>

                <div class="applications-table">
                    <div class="table-header">
                        <div class="col-name">Department</div>
                        <div class="col-email">Head of Department</div>
                        <div class="col-role">Status</div>
                        <div class="col-actions">Actions</div>
                    </div>
                    ${mockDepartments.map(dept => `
                        <div class="table-row">
                            <div class="col-name">${dept.name}</div>
                            <div class="col-email">${dept.head}</div>
                            <div class="col-role">
                                <span class="status-badge ${dept.active ? 'approved' : 'rejected'}">${dept.active ? 'Active' : 'Inactive'}</span>
                            </div>
                            <div class="col-actions">
                                <button class="action-btn review" onclick="openDepartmentModal('edit', ${dept.id})">Edit</button>
                                <button class="action-btn reject" onclick="toggleDepartmentStatus(${dept.id})">${dept.active ? 'Deactivate' : 'Activate'}</button>
                                <button class="action-btn delete" onclick="deleteDepartment(${dept.id})">Delete</button>
                            </div>
                        </div>
                    `).join('')}
                </div>

                <div id="departmentModal" class="modal-overlay hidden">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h3 id="departmentModalTitle">Add Department</h3>
                            <button class="modal-close" type="button" onclick="closeDepartmentModal()">×</button>
                        </div>
                        <div class="modal-body">
                            <div class="form-row">
                                <label for="departmentNameInput">Department Name</label>
                                <input id="departmentNameInput" type="text" placeholder="e.g., Computer Science" />
                            </div>
                            <div class="form-row">
                                <label for="departmentHeadInput">Head of Department</label>
                                <input id="departmentHeadInput" type="text" placeholder="e.g., Dr. Ada Lovelace" />
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button class="modal-btn cancel" type="button" onclick="closeDepartmentModal()">Cancel</button>
                            <button class="modal-btn approve" type="button" id="saveDepartmentBtn">Save</button>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('addDepartmentBtn').addEventListener('click', () => openDepartmentModal('create'));
        }

        function openDepartmentModal(mode, departmentId) {
            const modal = document.getElementById('departmentModal');
            const title = document.getElementById('departmentModalTitle');
            const nameInput = document.getElementById('departmentNameInput');
            const headInput = document.getElementById('departmentHeadInput');
            const saveBtn = document.getElementById('saveDepartmentBtn');

            modal.dataset.mode = mode;
            modal.dataset.departmentId = departmentId || '';

            if (mode === 'edit') {
                const dept = mockDepartments.find(d => d.id === departmentId);
                title.textContent = 'Edit Department';
                nameInput.value = dept.name;
                headInput.value = dept.head;
            } else {
                title.textContent = 'Add Department';
                nameInput.value = '';
                headInput.value = '';
            }

            saveBtn.onclick = () => saveDepartmentFromModal();
            modal.classList.remove('hidden');
        }

        function closeDepartmentModal() {
            const modal = document.getElementById('departmentModal');
            if (modal) {
                modal.classList.add('hidden');
            }
        }

        function saveDepartmentFromModal() {
            const modal = document.getElementById('departmentModal');
            const mode = modal.dataset.mode;
            const departmentId = parseInt(modal.dataset.departmentId);
            const name = document.getElementById('departmentNameInput').value.trim();
            const head = document.getElementById('departmentHeadInput').value.trim();

            if (!name || !head) {
                alert('Please provide both department name and head of department.');
                return;
            }

            if (mode === 'edit') {
                const dept = mockDepartments.find(d => d.id === departmentId);
                if (!dept) return;
                dept.name = name;
                dept.head = head;
            } else {
                const newId = Math.max(0, ...mockDepartments.map(d => d.id)) + 1;
                mockDepartments.push({ id: newId, name, head, active: true });
            }

            closeDepartmentModal();
            renderDepartmentManagement(document.getElementById('mainContent'));
        }

        function toggleDepartmentStatus(departmentId) {
            const dept = mockDepartments.find(d => d.id === departmentId);
            if (!dept) return;
            dept.active = !dept.active;
            renderDepartmentManagement(document.getElementById('mainContent'));
        }

        function deleteDepartment(departmentId) {
            const dept = mockDepartments.find(d => d.id === departmentId);
            if (!dept) return;

            if (confirm(`Delete department ${dept.name}? This cannot be undone.`)) {
                const index = mockDepartments.findIndex(d => d.id === departmentId);
                mockDepartments.splice(index, 1);
                renderDepartmentManagement(document.getElementById('mainContent'));
            }
        }

        function handleAccessToggle(e) {
            const ruleId = parseInt(e.target.dataset.rule);
            const role = e.target.dataset.role;
            const rule = mockAccessRules.find(r => r.id === ruleId);

            if (!rule) return;

            if (e.target.checked) {
                if (!rule.roles.includes(role)) {
                    rule.roles.push(role);

            } else {
                rule.roles = rule.roles.filter(r => r !== role);

        function saveAccessCodeFromModal() {
            const modal = document.getElementById('accessCodeModal');
            const mode = modal.dataset.mode;
            const codeId = parseInt(modal.dataset.codeId);
            const code = document.getElementById('accessCodeInput').value.trim().toUpperCase();
            const role = document.getElementById('accessCodeRoleSelect').value;
            const description = document.getElementById('accessCodeDescriptionInput').value.trim();

            if (!code || !role || !description) {
                alert('Please fill in all fields.');
                return;
            }

            // Check if code already exists (for new codes)
            if (mode === 'create' && mockAccessCodes.some(c => c.code === code)) {
                alert('This access code already exists.');
                return;
            }

            if (mode === 'edit') {
                const existingCode = mockAccessCodes.find(c => c.id === codeId);
                if (!existingCode) return;
                existingCode.code = code;
                existingCode.role = role;
                existingCode.description = description;
            } else {
                const newId = Math.max(0, ...mockAccessCodes.map(c => c.id)) + 1;
                mockAccessCodes.push({ id: newId, code, role, description, active: true });
            }

            closeAccessCodeModal();
            saveAccessCodesToStorage();
            renderSuperAdminAccessCodes(document.getElementById('mainContent'));
        }

            const code = mockAccessCodes.find(c => c.id === codeId);

            code.active = !code.active;
            saveAccessCodesToStorage();
            renderSuperAdminAccessCodes(document.getElementById('mainContent'));
        }

        function deleteAccessCode(codeId) {
            const code = mockAccessCodes.find(c => c.id === codeId);
            if (!code) return;

            if (confirm(`Delete access code "${code.code}"? This cannot be undone.`)) {

                mockAccessCodes.splice(index, 1);

                renderSuperAdminAccessCodes(document.getElementById('mainContent'));
            }
        }

        // Flag an application (moves it from pending to flagged)
        function flagApplication(id) {
            const appIndex = mockApplications.pending.findIndex(a => a.id === id);
            if (appIndex === -1) {
                alert('Application not found or already processed');
                return;
            }

            const reason = prompt('Enter the issue/reason for flagging this application:');
            if (!reason) {
                alert('Flagging cancelled. Please provide a valid issue description.');
                return;
            }

            const app = mockApplications.pending[appIndex];
            app.status = 'flagged';
            app.flagReason = reason;

            // Move from pending to flagged
            mockApplications.pending.splice(appIndex, 1);
            mockApplications.flagged.push(app);

            alert(`Application for ${app.name} has been flagged with: ${reason}`);

            const activePage = document.querySelector('.nav-item.active');
            if (activePage && activePage.dataset.page === 'pending') {
                renderPendingRequests(document.getElementById('mainContent'));
            }
        }

        // Process application (approve/reject/resolve)
        function processApplication(id, action) {
            const allApps = [...mockApplications.pending, ...mockApplications.approved, ...mockApplications.flagged];
            const app = allApps.find(a => a.id === id);

            if (!app) {
                alert('Application not found');
                return;
            }

            const actionText = action.charAt(0).toUpperCase() + action.slice(1);
            const confirmMsg = `Are you sure you want to ${action} the application for ${app.name}?`;

            if (confirm(confirmMsg)) {
                alert(`✓ Application ${id} has been ${action}d successfully!\n\nStudent: ${app.name}\nMatric: ${app.matric}\nStatus: ${action.toUpperCase()}`);

                // Refresh the current view
                const activePage = document.querySelector('.nav-item.active');
                if (activePage) {
                    const page = activePage.dataset.page;
                    if (page === 'pending') {
                        renderPendingRequests(document.getElementById('mainContent'));
                    } else if (page === 'approved') {
                        renderApprovedApplications(document.getElementById('mainContent'));
                    } else if (page === 'flagged') {
                        renderFlaggedApplications(document.getElementById('mainContent'));
                    }
                }
            }
        }

            const allApps = [...mockApplications.pending, ...mockApplications.approved, ...mockApplications.flagged];

            if (!app) {
                alert('Application not found');

            const modal = document.createElement('div');
            modal.className = 'modal-overlay';

            modal.innerHTML = `

                        </div>
                    </div>
                    <div class="modal-footer">
                        ${app.status === 'pending' ?
                            `<button class="modal-btn approve" type="button" data-id="${app.id}" data-action="approve">Approve</button>
                             <button class="modal-btn reject" type="button" data-id="${app.id}" data-action="reject">Reject</button>` :
                            app.status === 'flagged' ?
                            `<button class="modal-btn resolve" type="button" data-id="${app.id}" data-action="resolve">Resolve Issue</button>` :
                            ''
                        }
                        <button class="modal-btn cancel" type="button">Close</button>
                    </div>
                </div>
            `;

            document.body.appendChild(modal);

            // Attach event listeners to modal buttons
            const closeBtn = modal.querySelector('.modal-close');
            const cancelBtn = modal.querySelector('.modal-btn.cancel');
            const actionBtns = modal.querySelectorAll('.modal-btn[data-action]');

            closeBtn.addEventListener('click', () => closeModal());
            cancelBtn.addEventListener('click', () => closeModal());

            actionBtns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const appId = parseInt(btn.dataset.id);
                    const action = btn.dataset.action;
                    processApplication(appId, action);
                    closeModal();
                });
            });

            // Close modal when clicking overlay
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    closeModal();
                }
            });
        }

        // Close modal
        function closeModal() {
            const modal = document.querySelector('.modal-overlay');
            if (modal) {
                modal.remove();
            }
        }
