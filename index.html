<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MTU Clearance System</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="login-container">
        <div class="mode-toggle">
            <button id="loginModeBtn" class="mode-btn active">Log In</button>
            <button id="signupModeBtn" class="mode-btn">Sign Up</button>
        </div>

        <h1 class="login-title" id="pageTitle">LOG IN</h1>

        <form class="login-form" id="authForm">
            <!-- Sign Up Only Fields -->
            <div class="form-group signup-only">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="Enter your full name">
                <div id="name-error" class="error-message">Name is required</div>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="name@university.edu">
                <div id="email-error" class="error-message">Invalid email address</div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="******************">
                <div id="password-error" class="error-message">Password must not be empty</div>
            </div>

            <!-- Sign Up Only Fields -->
            <div class="form-group signup-only">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm your password">
                <div id="confirm-error" class="error-message">Passwords do not match</div>
            </div>

            <div class="form-group">
                <label for="role">Role</label>
                <select id="role" name="role" class="role-select">
                    <option value="">-- Select Role --</option>
                    <option value="student">Student</option>
                    <option value="officer">Clearance Officer</option>
                    <option value="admin">Admin</option>
                    <option value="super_admin">Super Admin</option>
                </select>
                <div id="role-error" class="error-message">Please select a role</div>
            </div>

            <!-- Sign Up Only Fields -->
            <div class="form-group signup-only">
                <label for="accessCode">Access Code</label>
                <input type="text" id="accessCode" name="accessCode" placeholder="Enter access code from super admin">
                <div id="access-error" class="error-message">Invalid access code</div>
            </div>

            <div class="form-actions login-only">
                <a href="#" class="forgot-password">Forgot Password?</a>
            </div>

            <button type="submit" class="signin-btn" id="submitBtn">SIGN IN</button>
        </form>
    </div>

    <script>
        // Load users from localStorage or use defaults
        function loadUsers() {
            const storedUsers = localStorage.getItem('mockUsers');
            if (storedUsers) {
                return JSON.parse(storedUsers);
            }
            // Default users
            return [
                { id: 1, name: 'Admin User', email: 'admin@mtu.edu', password: 'admin123', role: 'admin', active: true },
                { id: 2, name: 'Officer One', email: 'officer@mtu.edu', password: 'officer123', role: 'officer', active: true },
                { id: 3, name: 'Student Sample', email: 'student@mtu.edu', password: 'student123', role: 'student', active: true },
                { id: 4, name: 'superadmin user', email: 'superadmin@mtu.edu', password: 'superadmin123', role: 'super_admin', active: true }
            ];
        }

        // Load access codes from localStorage
        function loadAccessCodes() {
            const storedCodes = localStorage.getItem('accessCodes');
            if (storedCodes) {
                return JSON.parse(storedCodes);
            }
            // Default access codes
            return [
                { code: 'STUDENT2024', role: 'student', used: false },
                { code: 'OFFICER2024', role: 'officer', used: false },
                { code: 'ADMIN2024', role: 'admin', used: false },
                { code: 'SUPER2024', role: 'super_admin', used: false }
            ];
        }

        // Save users to localStorage
        function saveUsers(users) {
            localStorage.setItem('mockUsers', JSON.stringify(users));
        }

        // Save access codes to localStorage
        function saveAccessCodes(codes) {
            localStorage.setItem('accessCodes', JSON.stringify(codes));
        }

        // Toggle between login and signup modes
        function setMode(mode) {
            const loginBtn = document.getElementById('loginModeBtn');
            const signupBtn = document.getElementById('signupModeBtn');
            const title = document.getElementById('pageTitle');
            const submitBtn = document.getElementById('submitBtn');
            const signupFields = document.querySelectorAll('.signup-only');
            const loginFields = document.querySelectorAll('.login-only');

            if (mode === 'login') {
                loginBtn.classList.add('active');
                signupBtn.classList.remove('active');
                title.textContent = 'LOG IN';
                submitBtn.textContent = 'SIGN IN';
                signupFields.forEach(field => field.style.display = 'none');
                loginFields.forEach(field => field.style.display = 'block');
            } else {
                signupBtn.classList.add('active');
                loginBtn.classList.remove('active');
                title.textContent = 'SIGN UP';
                submitBtn.textContent = 'SIGN UP';
                signupFields.forEach(field => field.style.display = 'block');
                loginFields.forEach(field => field.style.display = 'none');
            }
        }

        // Initialize mode
        setMode('login');

        // Mode toggle event listeners
        document.getElementById('loginModeBtn').addEventListener('click', () => setMode('login'));
        document.getElementById('signupModeBtn').addEventListener('click', () => setMode('signup'));

        document.getElementById('authForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const isLogin = document.getElementById('loginModeBtn').classList.contains('active');

            if (isLogin) {
                handleLogin();
            } else {
                handleSignup();
            }
        });

        function handleLogin() {
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const roleSelect = document.getElementById('role');

            const emailValue = emailInput.value.trim();
            const passwordValue = passwordInput.value;
            const selectedRole = roleSelect.value;

            // Reset all error messages
            document.getElementById('email-error').style.display = 'none';
            document.getElementById('password-error').style.display = 'none';
            document.getElementById('role-error').style.display = 'none';

            let hasError = false;

            // Validate email
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailValue || !emailRegex.test(emailValue)) {
                document.getElementById('email-error').style.display = 'block';
                hasError = true;
            }

            // Validate password
            if (!passwordValue) {
                document.getElementById('password-error').style.display = 'block';
                hasError = true;
            }

            // Validate role
            if (!selectedRole) {
                document.getElementById('role-error').style.display = 'block';
                hasError = true;
            }

            if (hasError) return;

            // Check credentials
            const users = loadUsers();
            const user = users.find(u => u.email === emailValue && u.password === passwordValue && u.role === selectedRole && u.active);

            if (user) {
                // Store user session in localStorage
                localStorage.setItem('currentUser', JSON.stringify({
                    id: user.id,
                    name: user.name,
                    email: user.email,
                    role: selectedRole
                }));
                // Redirect to dashboard
                window.location.href = 'dashboard.html';
            } else {
                document.getElementById('email-error').style.display = 'block';
                document.getElementById('email-error').textContent = 'Invalid credentials or role mismatch';
            }
        }

        function handleSignup() {
            const nameInput = document.getElementById('name');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const confirmInput = document.getElementById('confirmPassword');
            const roleSelect = document.getElementById('role');
            const accessInput = document.getElementById('accessCode');

            const nameValue = nameInput.value.trim();
            const emailValue = emailInput.value.trim();
            const passwordValue = passwordInput.value;
            const confirmValue = confirmInput.value;
            const selectedRole = roleSelect.value;
            const accessValue = accessInput.value.trim();

            // Reset all error messages
            document.getElementById('name-error').style.display = 'none';
            document.getElementById('email-error').style.display = 'none';
            document.getElementById('password-error').style.display = 'none';
            document.getElementById('confirm-error').style.display = 'none';
            document.getElementById('role-error').style.display = 'none';
            document.getElementById('access-error').style.display = 'none';

            let hasError = false;

            // Validate name
            if (!nameValue) {
                document.getElementById('name-error').style.display = 'block';
                hasError = true;
            }

            // Validate email
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailValue || !emailRegex.test(emailValue)) {
                document.getElementById('email-error').style.display = 'block';
                hasError = true;
            }

            // Validate password
            if (!passwordValue || passwordValue.length < 6) {
                document.getElementById('password-error').style.display = 'block';
                document.getElementById('password-error').textContent = 'Password must be at least 6 characters';
                hasError = true;
            }

            // Validate confirm password
            if (passwordValue !== confirmValue) {
                document.getElementById('confirm-error').style.display = 'block';
                hasError = true;
            }

            // Validate role
            if (!selectedRole) {
                document.getElementById('role-error').style.display = 'block';
                hasError = true;
            }

            // Validate access code
            const accessCodes = loadAccessCodes();
            const validCode = accessCodes.find(code => code.code === accessValue && code.role === selectedRole && !code.used);
            if (!validCode) {
                document.getElementById('access-error').style.display = 'block';
                hasError = true;
            }

            if (hasError) return;

            // Check if email already exists
            const users = loadUsers();
            if (users.some(u => u.email === emailValue)) {
                document.getElementById('email-error').style.display = 'block';
                document.getElementById('email-error').textContent = 'Email already registered';
                return;
            }

            // Create new user
            const newUser = {
                id: Date.now(),
                name: nameValue,
                email: emailValue,
                password: passwordValue,
                role: selectedRole,
                active: true
            };

            users.push(newUser);
            saveUsers(users);

            // Mark access code as used
            validCode.used = true;
            saveAccessCodes(accessCodes);

            // Auto-login after signup
            localStorage.setItem('currentUser', JSON.stringify({
                id: newUser.id,
                name: newUser.name,
                email: newUser.email,
                role: selectedRole
            }));

            // Redirect to dashboard
            window.location.href = 'dashboard.html';
        }

        // Hide error when user starts typing again
        document.getElementById('email').addEventListener('input', function () {
            document.getElementById('email-error').style.display = 'none';
        });

        document.getElementById('password').addEventListener('input', function () {
            document.getElementById('password-error').style.display = 'none';
        });

        document.getElementById('role').addEventListener('change', function () {
            document.getElementById('role-error').style.display = 'none';
        });

        // Additional event listeners for signup fields
        document.getElementById('name').addEventListener('input', function () {
            document.getElementById('name-error').style.display = 'none';
        });

        document.getElementById('confirmPassword').addEventListener('input', function () {
            document.getElementById('confirm-error').style.display = 'none';
        });

        document.getElementById('accessCode').addEventListener('input', function () {
            document.getElementById('access-error').style.display = 'none';
        });
    </script>
</body>

</html>
